<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📚 Student Management System</h1>
            <p>Edit Student Information</p>
            <button id="logoutBtn" class="btn-secondary logout-btn">Logout</button>
        </header>

        <!-- Navigation -->
        <nav class="nav-links">
            <a href="index.html" class="btn-secondary" style="text-decoration: none; display: inline-block; padding: 10px 20px; border-radius: 4px;">← Back to Dashboard</a>
        </nav>

        <!-- Edit Student Form -->
        <section class="form-container">
            <div class="form-card">
                <h2>Edit Student Details</h2>
                <form id="edit-student-form">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" required placeholder="Enter student full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required placeholder="Enter student email">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required placeholder="Enter student phone number">
                    </div>

                    <div class="form-group">
                        <label for="course">Course *</label>
                        <select id="course" name="course" required>
                            <option value="">Select a course</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Business">Business</option>
                            <option value="Medicine">Medicine</option>
                            <option value="Arts">Arts</option>
                            <option value="Science">Science</option>
                            <option value="Law">Law</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="gpa">GPA</label>
                        <input type="number" id="gpa" name="gpa" step="0.01" min="0" max="4.0" placeholder="Enter GPA (0.0 - 4.0)">
                    </div>

                    <div class="form-group">
                        <label for="enrollment_date">Enrollment Date</label>
                        <input type="text" id="enrollment_date" name="enrollment_date" readonly placeholder="Auto-filled">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Update Student</button>
                        <button type="button" id="deleteBtn" class="btn-danger">Delete Student</button>
                        <a href="index.html" class="btn-secondary" style="text-decoration: none;">Cancel</a>
                    </div>

                    <div id="message" class="message"></div>
                </form>
            </div>
        </section>
    </div>

    <script src="theme-manager.js"></script>
    <script>
        const studentId = new URLSearchParams(window.location.search).get('id');

        // Check authentication on page load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/check_auth');
                if (response.status !== 200) {
                    window.location.href = 'login.html';
                } else {
                    if (studentId) {
                        await loadStudentData();
                    } else {
                        showMessage('Error: No student ID provided', 'error');
                        setTimeout(() => window.location.href = 'index.html', 2000);
                    }
                }
            } catch (error) {
                window.location.href = 'login.html';
            }
        });

        // Load student data
        async function loadStudentData() {
            try {
                const response = await fetch(`/api/students/${studentId}`);
                if (response.ok) {
                    const student = await response.json();
                    document.getElementById('name').value = student.name;
                    document.getElementById('email').value = student.email;
                    document.getElementById('phone').value = student.phone;
                    document.getElementById('course').value = student.course;
                    document.getElementById('gpa').value = student.gpa;
                    document.getElementById('enrollment_date').value = student.enrollment_date;
                } else {
                    showMessage('Student not found', 'error');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                }
            } catch (error) {
                showMessage('Error loading student data: ' + error.message, 'error');
            }
        }

        // Display message
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message ' + type;
            messageDiv.textContent = (type === 'error' ? '✗' : '✓') + ' ' + text;
        }

        // Handle logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = 'login.html';
        });

        // Handle form submission
        document.getElementById('edit-student-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                course: document.getElementById('course').value,
                gpa: document.getElementById('gpa').value || 0.0
            };

            try {
                const response = await fetch(`/api/students/${studentId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    showMessage('Student updated successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    const data = await response.json();
                    showMessage(data.error || 'Failed to update student', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        });

        // Handle delete button
        document.getElementById('deleteBtn').addEventListener('click', async () => {
            if (confirm('Are you sure you want to delete this student? This action cannot be undone.')) {
                try {
                    const response = await fetch(`/api/students/${studentId}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        showMessage('Student deleted successfully!', 'success');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        const data = await response.json();
                        showMessage(data.error || 'Failed to delete student', 'error');
                    }
                } catch (error) {
                    showMessage('Error: ' + error.message, 'error');
                }
            }
        });
    </script>
</body>
</html>
