<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📚 Student Management System</h1>
            <p>Manage your student database efficiently</p>
            <button id="logoutBtn" class="btn-secondary logout-btn">Logout</button>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-button active" data-tab="dashboard">Dashboard</button>
            <button class="tab-button" data-tab="add-student">Add Student</button>
            <button class="tab-button" data-tab="manage">Manage Students</button>
            <a href="reports.html" class="tab-button" style="text-decoration: none; cursor: pointer;">📊 Reports</a>
            <a href="courses.html" class="tab-button" style="text-decoration: none; cursor: pointer;">🎓 Courses</a>
            <a href="settings.html" class="tab-button" style="text-decoration: none; cursor: pointer;">⚙️ Settings</a>
        </nav>

        <!-- Dashboard Tab -->
        <section id="dashboard" class="tab-content active">
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>Total Students</h3>
                    <p class="stat-number" id="total-students">0</p>
                </div>
                <div class="stat-card">
                    <h3>Average GPA</h3>
                    <p class="stat-number" id="avg-gpa">0.0</p>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search by name, course, or email...">
                <button onclick="searchStudents()">Search</button>
                <button onclick="clearSearch()" class="btn-secondary">Clear</button>
            </div>

            <div class="students-list">
                <h2>All Students</h2>
                <div id="students-table-container">
                    <table id="students-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Course</th>
                                <th>GPA</th>
                                <th>Enrollment Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="students-tbody">
                            <tr>
                                <td colspan="8" class="center">No students found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Add Student Tab -->
        <section id="add-student" class="tab-content">
            <div class="form-container">
                <h2>Add New Student</h2>
                <form id="add-student-form" onsubmit="addStudent(event)">
                    <div class="form-group">
                        <label for="student-name">Full Name *</label>
                        <input type="text" id="student-name" required placeholder="Enter full name">
                    </div>

                    <div class="form-group">
                        <label for="student-email">Email Address *</label>
                        <input type="email" id="student-email" required placeholder="Enter email">
                    </div>

                    <div class="form-group">
                        <label for="student-phone">Phone Number *</label>
                        <input type="tel" id="student-phone" required placeholder="Enter phone number">
                    </div>

                    <div class="form-group">
                        <label for="student-course">Course *</label>
                        <input type="text" id="student-course" required placeholder="Enter course name">
                    </div>

                    <div class="form-group">
                        <label for="student-gpa">GPA</label>
                        <input type="number" id="student-gpa" placeholder="Enter GPA (0-4.0)" min="0" max="4" step="0.1">
                    </div>

                    <button type="submit" class="btn-primary">Add Student</button>
                    <button type="reset" class="btn-secondary">Clear Form</button>
                </form>
            </div>
        </section>

        <!-- Manage Students Tab -->
        <section id="manage" class="tab-content">
            <div class="manage-container">
                <h2>Manage Students</h2>
                <div id="manage-students-list"></div>
            </div>
        </section>

        <!-- Edit Modal -->
        <div id="edit-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Edit Student</h2>
                <form id="edit-student-form" onsubmit="updateStudent(event)">
                    <input type="hidden" id="edit-student-id">
                    
                    <div class="form-group">
                        <label for="edit-name">Full Name *</label>
                        <input type="text" id="edit-name" required>
                    </div>

                    <div class="form-group">
                        <label for="edit-email">Email Address *</label>
                        <input type="email" id="edit-email" required>
                    </div>

                    <div class="form-group">
                        <label for="edit-phone">Phone Number *</label>
                        <input type="tel" id="edit-phone" required>
                    </div>

                    <div class="form-group">
                        <label for="edit-course">Course *</label>
                        <input type="text" id="edit-course" required>
                    </div>

                    <div class="form-group">
                        <label for="edit-gpa">GPA</label>
                        <input type="number" id="edit-gpa" min="0" max="4" step="0.1">
                    </div>

                    <button type="submit" class="btn-primary">Update Student</button>
                    <button type="button" class="btn-secondary" onclick="closeEditModal()">Cancel</button>
                </form>
            </div>
        </div>
    </div>

    <script src="theme-manager.js"></script>
    <script src="script.js"></script>
</body>
</html>
